<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KA-G Real-time Streaming Lead Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800 font-sans relative">

  <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20 hidden md:flex">
    <div class="p-6 border-b border-slate-700">
      <h1 class="text-2xl font-black tracking-wider text-blue-400">KA-G<span class="text-white text-lg font-light"> ENGINE</span></h1>
      <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Deep Data Scraper</p>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a href="#" class="flex items-center gap-3 bg-blue-600 text-white p-3 rounded-lg transition shadow-lg shadow-blue-500/30"><i class="fa-solid fa-satellite-dish"></i> Radar (Live Leads)</a>
      <a href="#" class="flex items-center gap-3 text-slate-300 hover:bg-slate-800 p-3 rounded-lg transition"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="bg-white px-8 py-5 flex justify-between items-center shadow-sm border-b border-slate-200 z-10">
      <div class="flex items-center gap-4">
        <div>
          <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            Live Streaming Radar <span class="text-xs font-black text-red-500 bg-red-50 px-2 py-0.5 rounded border border-red-200 animate-pulse">REAL-TIME SECONDS</span>
          </h2>
        </div>
        <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-ping"></span> WebSocket Connected
        </span>
      </div>
      <div class="text-xs font-mono text-slate-500 flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg">
        <i class="fa-solid fa-network-wired text-blue-500 animate-pulse"></i> Data Stream: <span id="stream-counter" class="font-bold text-slate-800">0</span> packets/sec
      </div>
    </header>

    <div class="px-8 py-4 grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50 border-b border-slate-100">
      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
        <div><p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Leads ทั้งหมดในเซสชัน</p><p class="text-2xl font-bold text-slate-800" id="stat-total-leads">2</p></div>
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-bolt text-lg"></i></div>
      </div>
      <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
        <div><p class="text-xs text-slate-500 font-medium uppercase tracking-wider">ความเร็วการซิงค์ข้อมูล</p><p class="text-2xl font-bold text-green-600 font-mono">0.2s <span class="text-xs font-normal text-slate-400">Latency</span></p></div>
        <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-600"><i class="fa-solid fa-gauge-high text-lg"></i></div>
      </div>
    </div>

    <div class="flex-1 overflow-x-auto overflow-y-hidden px-8 pb-8 pt-4">
      <div class="flex-1 overflow-x-auto overflow-y-hidden px-8 pb-8 pt-4">
  <div class="flex gap-6 h-full" id="kanban-board"></div>
</div>
  </main>

  <div id="chat-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex justify-center items-center opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-300" id="chat-modal-content">
      <div id="chat-header" class="bg-blue-600 p-4 text-white flex justify-between items-center">
        <h3 class="font-bold flex items-center gap-2" id="chat-title"><i class="fa-brands fa-facebook text-xl"></i> ตอบกลับลูกค้า</h3>
        <button onclick="closeChat()" class="text-white hover:text-slate-200 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <div class="p-6">
        <p class="text-xs font-bold text-slate-500 mb-2">ข้อความโต้ตอบ:</p>
        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-5 text-sm text-slate-700 italic" id="chat-original-post"></div>
        <textarea id="chat-reply-text" rows="4" class="w-full border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="พิมพ์ข้อความตอบกลับ..."></textarea>
      </div>
      <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-end gap-3">
        <button onclick="closeChat()" class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg text-sm font-bold transition">ยกเลิก</button>
        <button onclick="sendReply()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold transition">
  <i class="fa-solid fa-paper-plane"></i> ส่งทันที (Real-time)
</button>
      </div>
    </div>
  </div>
<!-- Supabase CDN ต้องอยู่ก่อน script.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="./script.js"></script>
</body>
</html>
